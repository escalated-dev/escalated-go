name: escalated-go-demo

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ENV: demo
      DATABASE_URL: "postgres://escalated:escalated@db:5432/escalated?sslmode=disable"
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: escalated
      POSTGRES_USER: escalated
      POSTGRES_PASSWORD: escalated
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escalated -d escalated"]
      interval: 2s
      retries: 15

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
